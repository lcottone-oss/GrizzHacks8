<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Legal Help Assistant</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!--  Bootstrap 4 CSS -->
  <link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
  >

  <style>
    body {
      padding-top: 70px;
    }
    .navbar-brand {
      font-weight: 600;
    }
  </style>
</head>

<body>

<!--  NAVBAR (BOOTSTRAP 4 – STABLE) -->
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
  <a class="navbar-brand" href="/">How Can We Help You?</a>

  <button class="navbar-toggler" type="button"
          data-toggle="collapse"
          data-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">

      <li class="nav-item">
        <a class="nav-link" href="/">Home</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="/Renters_Rights">Renter's Rights</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="/Small_Businesses">Small Businesses</a>
      </li>

      <!--  PERSONAL INJURY DROPDOWN -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle"
           href="#"
           id="injuryDropdown"
           role="button"
           data-toggle="dropdown"
           aria-haspopup="true"
           aria-expanded="false">
          Personal Injury
        </a>
        <div class="dropdown-menu" aria-labelledby="injuryDropdown">
          <a class="dropdown-item" href="/Personal_Injury">Auto Accidents</a>
          <a class="dropdown-item" href="/Personal_Injury">Slip & Fall</a>
          <a class="dropdown-item" href="/Personal_Injury">Workplace Injuries</a>
        </div>
      </li>

      <!--  SMALL CLAIMS DROPDOWN -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle"
           href="#"
           id="claimsDropdown"
           role="button"
           data-toggle="dropdown"
           aria-haspopup="true"
           aria-expanded="false">
          Small Claims
        </a>
        <div class="dropdown-menu" aria-labelledby="claimsDropdown">
          <a class="dropdown-item" href="/Small_Claims">Filing a Claim</a>
          <a class="dropdown-item" href="/Small_Claims">Court Process</a>
        </div>
      </li>

    </ul>

    <form class="form-inline my-2 my-lg-0">
      <input class="form-control mr-sm-2" type="search" placeholder="Search">
      <button class="btn btn-outline-success my-2 my-sm-0" type="submit">
        Search
      </button>
    </form>
  </div>
</nav>

<!--  PAGE CONTENT -->
<div class="container">
  {% block content %}{% endblock %}
</div>

<!--  BOOTSTRAP 4 JS (ORDER MATTERS) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

{% block scripts %}{% endblock %}

</body>
</html>
``

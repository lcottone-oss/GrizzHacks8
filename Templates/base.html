<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Mitten Mentor - Michigan Legal Help{% endblock %}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <!-- Google Fonts: Playfair Display & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* Modern Judicial Theme Colors */
    :root {
      --charcoal: #ffffff;
      --limestone: #e8e6e1;
      --charcoal-light: #4a4a4a;
      --accent-gold: #d4af37;
      --legal-gray: #5a5a5a;
    }

    body {
      background-color: var(--limestone);
      color: var(--charcoal);
      padding-top: 70px;
      position: relative;
      overflow-x: hidden;
    }

    /* Legal Seal Watermark */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><defs><style>.seal{fill:none;stroke:%232a2a2a;stroke-width:1.5;opacity:0.02;}<\/style></defs><circle cx="100" cy="100" r="95" class="seal"/><circle cx="100" cy="100" r="85" class="seal"/><path d="M100,20 L140,80 L190,70 L150,110 L170,160 L110,130 L60,170 L80,110 L30,70 L100,90 Z" class="seal"/><text x="100" y="185" text-anchor="middle" class="seal" font-size="12" font-family="serif">LEGAL SEAL</text></svg>');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      pointer-events: none;
      z-index: 0;
    }

    /* Limestone texture overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 1px, transparent 1px),
        radial-gradient(circle at 80% 80%, rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    /* Navbar Styling */
    nav {
      background: rgba(42, 42, 42, 0.95) !important;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 12px 20px !important;
      position: relative;
      z-index: 100;
    }

    .navbar-brand {
      color: var(--charcoal) !important;
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .nav-link {
      color: var(--charcoal) !important;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
      transition: color 0.3s ease, border-bottom 0.3s ease;
      position: relative;
      padding-bottom: 4px !important;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent-gold);
      transition: width 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .nav-link:hover {
      color: var(--accent-gold) !important;
    }

    .navbar-toggler-icon {
      filter: invert(1);
    }

    .dropdown-menu {
      background: rgba(42, 42, 42, 0.95) !important;
      border: 1px solid var(--accent-gold);
    }

    .dropdown-item {
      color: var(--limestone) !important;
      transition: all 0.3s ease;
    }

    .dropdown-item:hover {
      background: var(--accent-gold) !important;
      color: var(--charcoal) !important;
    }

    main {
      position: relative;
      z-index: 1;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>

<body>

<!--  NAVBAR (Modern Judicial) -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <a class="navbar-brand" href="/">Civixs</a>

  <button class="navbar-toggler" type="button"
          data-toggle="collapse"
          data-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">

      <li class="nav-item">
        <a class="nav-link" href="/">Home</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="/Renters_Rights">Renter's Rights</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="/Small_Businesses">Small Businesses</a>
      </li>

      <!--  PERSONAL INJURY DROPDOWN -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle"
           href="#"
           id="injuryDropdown"
           role="button"
           data-toggle="dropdown"
           aria-haspopup="true"
           aria-expanded="false">
          Personal Injury
        </a>
        <div class="dropdown-menu" aria-labelledby="injuryDropdown">
          <a class="dropdown-item" href="/Personal_Injury">Auto Accidents</a>
          <a class="dropdown-item" href="/Personal_Injury">Slip & Fall</a>
          <a class="dropdown-item" href="/Personal_Injury">Workplace Injuries</a>
        </div>
      </li>

      <!--  SMALL CLAIMS DROPDOWN -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle"
           href="/Small_Claims"
           id="claimsDropdown"
           role="button"
           data-toggle="dropdown"
           aria-haspopup="true"
           aria-expanded="false">
          Small Claims
        </a>
        <div class="dropdown-menu" aria-labelledby="claimsDropdown">
          <a class="dropdown-item" href="/Small_Claims">Filing a Claim</a>
          <a class="dropdown-item" href="/Small_Claims">Court Process</a>
        </div>
      </li>

    </ul>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<!--  BOOTSTRAP 4 JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

{% block extra_scripts %}{% endblock %}

</body>
</html>

{% extends "base.html" %}
{% block title %}Login — Mitten Mentor{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 100px auto; padding: 40px; border: 2px solid var(--charcoal); background: white;">
    <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 24px; font-size: 2rem;">Sign In</h2>
    {% if error %}
        <p style="color: red; margin-bottom: 16px;">{{ error }}</p>
    {% endif %}
    <form method="POST">
        <label style="display:block; font-weight:600; margin-bottom:6px;">Username</label>
        <input name="username" type="text" required
            style="width:100%; padding:12px; border:2px solid var(--charcoal); margin-bottom:16px; font-size:15px;">
        <label style="display:block; font-weight:600; margin-bottom:6px;">Password</label>
        <input name="password" type="password" required
            style="width:100%; padding:12px; border:2px solid var(--charcoal); margin-bottom:24px; font-size:15px;">
        <button type="submit"
            style="width:100%; padding:14px; background:var(--charcoal); color:var(--accent-gold); border:none; font-weight:700; font-size:15px; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">
            Sign In
        </button>
    </form>
    <p style="margin-top:20px; text-align:center; color:var(--legal-gray);">
        No account? <a href="/register" style="color:var(--accent-gold); font-weight:600;">Register</a>
    </p>
</div>
{% endblock %}
